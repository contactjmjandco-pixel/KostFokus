    main{padding:22px 0 110px}.top-actions{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start;margin-top:12px}.compact-actions{display:grid;grid-template-columns:1fr;gap:8px;margin:0;max-width:190px}.top-actions .compact-actions{margin:0}.compact-actions button{width:100%;min-width:0;padding:9px 10px;white-space:nowrap}.top-actions .toggle-row{margin:0}.top-actions .compact-toggles{grid-column:3 / span 3;display:grid;grid-template-columns:repeat(2,minmax(180px,1fr))!important;gap:8px;max-width:none}.top-actions .compact-actions button,.top-actions .compact-toggles .toggle-card{height:42px}.top-actions .compact-toggles .toggle-card{width:100%;min-height:0;padding:9px 10px;align-items:center}.controls{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 20px}.toggle-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}.toggle-card{display:flex;gap:12px;align-items:flex-start;padding:15px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.045);box-shadow:var(--shadow)}.toggle-card input{width:22px;height:22px;accent-color:var(--green);margin-top:2px}.toggle-card p{margin:0;color:var(--muted);font-size:.92rem}.refeed-note{display:none;margin:0 0 18px;padding:14px 16px;border:1px solid rgba(245,199,99,.34);border-radius:8px;background:var(--warn);color:#ffe2a1;font-weight:800}.refeed-note.active{display:block}.auto-adjust-note{margin:10px 0 0;color:var(--muted);font-size:.9rem;max-width:760px}.auto-adjust-status{margin:6px 0 0;color:var(--green);font-size:.9rem;font-weight:800}
    .meal{margin-bottom:18px}.meal-head{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 18px;background:linear-gradient(135deg,rgba(53,224,161,.14),rgba(255,255,255,.035));border-bottom:1px solid var(--line)}.meal-title{display:flex;align-items:center;gap:10px}.meal-title input{width:19px;height:19px;accent-color:var(--green)}.meal-title h2{margin:0}.meal-total{text-align:right;font-weight:800;white-space:nowrap;color:var(--green)}.select-wrap{padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}select{width:min(100%,430px);padding:11px 12px;border-radius:8px;border:1px solid var(--line);background:#0d1622;color:var(--ink);font-weight:700}.meal-body{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}th{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.025)}.num{text-align:right}.ingredient-name{font-weight:750}.muted{color:var(--muted);font-size:.9rem}.amount-head,.amount-cell{min-width:210px}.amount-head{position:relative;text-align:left}.amount-head span{display:inline-block;position:relative;left:calc(50% - 31px);transform:translateX(-50%)}.amount-control{display:grid;grid-template-columns:32px 58px 32px 56px;align-items:center;gap:6px;justify-content:center}.amount-control button{width:32px;height:32px;padding:0;border-radius:8px;background:rgba(53,224,161,.1);color:var(--green);border:1px solid var(--green3);box-shadow:none}.amount-control .muted{text-align:left;white-space:nowrap}input[type=number]{width:58px;padding:8px 6px;border:1px solid var(--line);border-radius:8px;background:#0d1622;text-align:center;color:var(--ink);appearance:textfield}input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}input[type=checkbox]{accent-color:var(--green <header><div class="wrap"><h1>KostFokus</h1><div class="top-grid card pad"><section><h2>Översikt</h2><div class="overview"><div class="metric"><div class="metric-head"><div class="label">Startvikt</div><button class="icon-button" type="button" onclick="toggleWeightValue('startWeight',this)" aria-label="Visa startvikt" title="Visa startvikt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="value weight-value" id="startWeight"><input class="weight-input" id="startWeightInput" type="number" min="40" max="250" step="0.1" value="100" onchange="updateWeight('start',this.value)"><span>kg</span></div></div><div class="metric"><div class="metric-head"><div class="label">Vikt</div><button class="icon-button" type="button" onclick="toggleWeightValue('currentWeight',this)" aria-label="Visa nuvarande vikt" title="Visa nuvarande vikt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="value weight-value" id="currentWeight"><input class="weight-input" id="currentWeightInput" type="number" min="40" max="250" step="0.1" value="100" onchange="updateWeight('current',this.value)"><span>kg</span></div></div><div class="metric"><div class="metric-head"><div class="label">Målvikt</div><button class="icon-button" type="button" onclick="toggleWeightValue('goalWeight',this)" aria-label="Visa målvikt" title="Visa målvikt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="value weight-value" id="goalWeight"><input class="weight-input" id="goalWeightInput" type="number" min="40" max="250" step="0.1" value="100" onchange="updateWeight('goal',this.value)"><span>kg</span></div></div><div class="metric"><div class="label">Kalorimål</div><div class="value" id="calorieGoalText">1 900-2 050</div></div><div class="metric"><div class="label">Tid till mål</div><div class="value" id="goalTimeText">-</div></div></div><div class="top-actions"><div class="controls compact-actions"><button onclick="savePlan()">Spara mina ändringar</button><button class="danger" onclick="resetPlan()">Återställ till standard</button></div><section class="toggle-row compact-toggles"><label class="toggle-card"><input type="checkbox" id="autoAdjustToggle" onchange="toggleAutoAdjust(this.checked)"><div><strong>Auto Portionsize</strong></div></label><label class="toggle-card"><input type="checkbox" id="refeedToggle" onchange="toggleRefeed(this.checked)"><div><strong>Refeed</strong></div></label><label class="toggle-card"><input type="checkbox" id="trainingToggle" onchange="toggleTrainingMeal(this.checked)"><div><strong>Recovery</strong></div></label></section></div></section><aside class="summary"><h2>Dagens total</h2><div class="big-totals"><div class="total-box"><strong id="totalCalories">0 kcal</strong><span id="calorieDiff">Mot mål</span></div><div class="total-box"><strong id="totalProtein">0 g</strong><span id="proteinDiff">Mot mål</span></div></div><div class="bar-label"><span>Kalorier</span><span id="calorieBarText">0%</span></div><div class="progress"><div id="calorieBar"></div></div><div class="bar-label"><span>Protein</span><span id="proteinBarText">0%</span></div><div class="progress"><div id="proteinBar"></div></div><p class="note" id="modeNote"></p></aside></div></div></header>
<main class="wrap"><section id="meals"></section></main>
<div class="footer-summary"><div class="footer-summary-inner"><div><span>Kalorier</span><strong id="mobileCalories">0 kcal</strong></div><div><span>Protein</span><strong id="mobileProtein">0 g</strong></div><div><span>Status</span><strong id="mobileStatus">-</strong></div></div></div><div class="toast" id="toast"></div><div class="confirm-overlay" id="resetConfirm" role="dialog" aria-modal="true" aria-labelledby="resetConfirmTitle"><div class="confirm-box"><h3 id="resetConfirmTitle">Återställ plan?</h3><p>Vill du återställa planen till standard?</p><div class="confirm-actions"><button class="secondary" type="button" onclick="closeResetConfirm()">Avbryt</button><button class="danger" type="button" onclick="confirmResetPlan()">Återställ</button></div></div></div>

aseProtein:62,active:true},{id:"potatoes_dinner",name:"Potatis",baseAmount:300,amount:300,unit:"g",baseKcal:231,baseProtein:3,active:true},{id:"sauce_dinner",name:"Sås",baseAmount:15,amount:15,unit:"g",baseKcal:55,baseProtein:.5,active:true}]},flaskytterfile_ris:{title:"Fläskytterfilé + ris",ingredients:[{id:"pork_lifter",name:"Fläskytterfilé",baseAmount:220,amount:220,unit:"g",baseKcal:297,baseProtein:62,active:true},{id:"rice_dinner",name:"Ris",baseAmount:200,amount:200,unit:"g",baseKcal:249,baseProtein:4,active:true},{id:"sauce_dinner",name:"Sås",baseAmount:15,amount:15,unit:"g",baseKcal:55,baseProtein:.5,active:true}]},hamburgare:{title:"Hamburgare",ingredients:[{id:"hamburgare_hogrev",name:"2 hamburgare (250g högrev)",baseAmount:1,amount:1,unit:"portion",baseKcal:1200,baseProtein:70,active:true}]},tacos:{title:"Tacos",ingredients:[{id:"beef",name:"Nötfärs, 15% fett",baseAmount:200,amount:200,unit:"g",baseKcal:500,baseProtein:40,active:true},{id:"cheese",name:"Riven ost",baseAmount:40,amount:40,unit:"g",baseKcal:160,baseProtein:10,active:true},{id:"greens_salsa",name:"Sallad/grönt/salsa",baseAmount:1,amount:1,unit:"portion",baseKcal:20,baseProtein:1,active:true}]}}},training:{title:"Efter träning / extra energi",active:false,type:"fixed",ingredients:[{id:"banana",name:"Banan",baseAmount:1,amount:1,unit:"st",baseKcal:105,baseProtein:1,active:true},{id:"rice_cakes",name:"Riskakor",baseAmount:2,amount:2,unit:"st",baseKcal:70,baseProtein:1,active:true}]},evening:{title:"Kvällsmål",active:true,type:"fixed",ingredients:[{id:"quark",name:"Lindahls kvarg",baseAmount:250,amount:250,unit:"g",baseKcal:135,baseProtein:30,active:true},{id:"granola",name:"Granola",baseAmount:20,amount:20,unit:"g",baseKcal:100,baseProtein:2,active:true}]}}};
const STORAGE_KEY="kostfokus_plan_v2";let currentPlan=deepClone(PLAN_DATA);function deepClone(obj){return JSON.parse(JSON.stringify(obj))}function formatNumber(value,decimals=0){return Number(value).toLocaleString("sv-SE",{maximumFractionDigits:decimals,minimumFractionDigits:decimals})}function ingredientValues(ingredient){if(!ingredient.active)return{kcal:0,protein:0};const ratio=Number(ingredient.amount||0)/Number(ingredient.baseAmount||1);return{kcal:ingredient.baseKcal*ratio,protein:ingredient.baseProtein*ratio}}function getSelectedKey(meal){return currentPlan.settings[meal.settingKey]}function getMealIngredients(mealKey){const meal=currentPlan.meals[mealKey];if(!meal)return[];if(meal.type==="options"){const selected=getSelectedKey(meal);return meal.options[selected]?.ingredients||[]}return meal.ingredients||[]}function calculateMeal(mealKey){const meal=currentPlan.meals[mealKey];if(!meal||!meal.active)return{kcal:0,protein:0};return getMealIngredients(mealKey).reduce((acc,item)=>{const v=ingredientValues(item);acc.kcal+=v.kcal;acc.protein+=v.protein;return acc},{kcal:0,protein:0})}function calculateTotals(){return Object.keys(currentPlan.meals).reduce((acc,key)=>{const m=calculateMeal(key);acc.kcal+=m.kcal;acc.protein+=m.protein;return acc},{kcal:0,protein:0})}function eachPlanIngredient(callback){Object.keys(currentPlan.meals).forEach(mealKey=>{const meal=currentPlan.meals[mealKey];if(!meal)return;if(meal.type==="options"){Object.values(meal.options||{}).forEach(option=>(option.ingredients||[]).forEach(item=>callback(item,mealKey)))}else{(meal.ingredients||[]).forEach(item=>callback(item,mealKey))}})}function ensureSettingsDefaults(){currentPlan.settings=currentPlan.settings||{};Object.keys(PLAN_DATA.settings).forEach(key=>{if(currentPlan.settings[key]===undefined||currentPlan.settings[key]===null)currentPlan.settings[key]=PLAN_DATA.settings[key]});if(currentPlan.settings.lastAutoAdjustKcal===undefined)currentPlan.settings.lastAutoAdjustKcal=0}function ensureIngredientAdjustDefaults(){eachPlanIngredient(item=>{const id=item.id||"";const name=(item.name||"").toLowerCase();let rule=null;if(id.includes("granola")||id.includes("extra")||name.includes("extra energi"))rule={adjustable:true,adjustPriority:1,minAmount:0};else if(id.includes("banana")||id.includes("rice_cakes"))rule={adjustable:true,adjustPriority:1,minAmount:0};else if(id.includes("rice"))rule={adjustable:true,adjustPriority:2,minAmount:80};else if(id.includes("potatoes"))rule={adjustable:true,adjustPriority:2,minAmount:150};else if(id.includes("sauce")||id.includes("dressing")||name.includes("sås"))rule={adjustable:true,adjustPriority:3,minAmount:5};else if(id.includes("peanut_butter")||id.includes("cheese")||name.includes("ost"))rule={adjustable:true,adjustPriority:4,minAmount:0};else if(id.includes("chicken")||id.includes("pork")||id.includes("protein")||id.includes("quark")||id.includes("hamburgare")||id.includes("beef")||id.includes("yogurt")||name.includes("kyckling")||name.includes("fläsk")||name.includes("nötfärs")||name.includes("kvarg")||name.includes("protein")||name.includes("yoghurt")||name.includes("yogurt"))rule={adjustable:false};if(!rule)return;Object.keys(rule).forEach(key=>{item[key]=rule[key]})})}function roundToNearest(value,step){return Math.round(value/step)*step}function ensureMetaDefaults(){currentPlan.meta=currentPlan.meta||{};const defaults=PLAN_DATA.meta;["startWeightKg","goalWeightKg","currentWeightKg","startCalorieGoalMin","startCalorieGoalMax","calorieReductionPerKgLost","minCalorieGoalMin","minCalorieGoalMax","calorieGoalMin","calorieGoalMax","proteinGoal","refeedCalorieGoalMin","refeedCalorieGoalMax","refeedProteinGoal"].forEach(key=>{if(currentPlan.meta[key]===undefined||currentPlan.meta[key]===null||currentPlan.meta[key]==="")currentPlan.meta[key]=defaults[key]});if(!currentPlan.meta.currentWeightKg)currentPlan.meta.currentWeightKg=currentPlan.meta.startWeightKg||100}function updateTargetsFromWeight(){ensureMetaDefaults();const m=currentPlan.meta;const start=Number(m.startWeightKg)||100;const current=Number(m.currentWeightKg)||start;const goal=Number(m.goalWeightKg)||100;const kgLost=Math.max(0,start-current);const reduction=kgLost*(Number(m.calorieReductionPerKgLost)||25);m.calorieGoalMin=Math.max(Number(m.minCalorieGoalMin)||1600,roundToNearest((Number(m.startCalorieGoalMin)||1900)-reduction,25));m.calorieGoalMax=Math.max(Number(m.minCalorieGoalMax)||1750,roundToNearest((Number(m.startCalorieGoalMax)||2050)-reduction,25));const proteinBase=goal<start?goal:current;m.proteinGoal=Math.max(180,roundToNearest(proteinBase*2.1,5));m.refeedProteinGoal=m.proteinGoal}function updateWeight(type,value){const n=Math.max(40,Math.min(250,Number(value)||0));if(!n)return;if(type==="start"){currentPlan.meta.startWeightKg=n}else if(type==="current"){currentPlan.meta.currentWeightKg=n}else{currentPlan.meta.goalWeightKg=n}updateTargetsFromWeight();runAutoAdjustIfEnabled();refresh()}function activeGoals(){const m=currentPlan.meta;return currentPlan.settings.refeedActive?{calorieMin:m.refeedCalorieGoalMin,calorieMax:m.refeedCalorieGoalMax,protein:m.refeedProteinGoal}:{calorieMin:m.calorieGoalMin,calorieMax:m.calorieGoalMax,protein:m.proteinGoal}}function renderMeals(){const root=document.getElementById("meals");root.innerHTML="";Object.keys(currentPlan.meals).forEach(mealKey=>{const meal=currentPlan.meals[mealKey];const total=calculateMeal(mealKey);const section=document.createElement("section");section.className="card meal";section.innerHTML=`<div class="meal-head"><label class="meal-title"><input type="checkbox" ${meal.active?"checked":""} onchange="toggleMeal('${mealKey}',this.checked)"><h2>${meal.title}</h2></label><div class="meal-total">${formatNumber(total.kcal)} kcal · ${formatNumber(total.protein,1)} g protein</div></div>${meal.type==="options"?renderOptionSelect(mealKey):""}<div class="meal-body">${renderIngredientTable(mealKey,!meal.active)}</div>`;root.appendChild(section)})}function renderOptionSelect(mealKey){const meal=currentPlan.meals[mealKey];const selected=getSelectedKey(meal);const options=Object.entries(meal.options).map(([key,opt])=>`<option value="${key}" ${key===selected?"selected":""}>${opt.title}</option>`).join("");return`<div class="select-wrap"><select onchange="selectOption('${mealKey}',this.value)">${options}</select></div>`}function renderIngredientTable(mealKey,mealInactive){const rows=getMealIngredients(mealKey).map((item,index)=>{const v=ingredientValues(item);return`<tr class="${(!item.active||mealInactive)?"inactive":""}"><td><div class="ingredient-name">${item.name}</div><div class="muted">Bas: ${formatNumber(item.baseAmount,1)} ${item.unit}</div></td><td class="num amount-cell"><div class="amount-control"><button onclick="stepAmount('${mealKey}',${index},-1)" aria-label="Minska">-</button><input type="number" min="0" step="${amountStep(item)}" value="${Number(item.amount)}" onchange="updateIngredient('${mealKey}',${index},this.value)"><button onclick="stepAmount('${mealKey}',${index},1)" aria-label="Öka">+</button><span class="muted">${item.unit}</span></div></td><td class="num">${formatNumber(v.kcal)} kcal</td><td class="num">${formatNumber(v.protein,1)} g</td><td class="num"><input type="checkbox" ${item.active?"checked":""} onchange="toggleIngredient('${mealKey}',${index},this.checked)"></td></tr>`}).join("");return`<table><thead><tr><th>Ingrediens</th><th class="amount-head"><span>Mängd</span></th><th class="num">Kcal</th><th class="num">Protein</th><th class="num">Aktiv</th></tr></thead><tbody>${rows}</tbody></table>`}function amountStep(item){return item.unit==="st"||item.unit==="portion"?1:5}function selectOption(mealKey,value){const meal=currentPlan.meals[mealKey];currentPlan.settings[meal.settingKey]=value;runAutoAdjustIfEnabled();refresh()}function updateIngredient(mealKey,index,value){const item=getMealIngredients(mealKey)[index];item.amount=Math.max(0,Number(value)||0);refresh()}function stepAmount(mealKey,index,direction){const item=getMealIngredients(mealKey)[index];item.amount=Math.max(0,Number(item.amount||0)+amountStep(item)*direction);refresh()}function toggleIngredient(mealKey,index,checked){getMealIngredients(mealKey)[index].active=checked;refresh()}function toggleMeal(mealKey,checked){currentPlan.meals[mealKey].active=checked;if(mealKey==="training")currentPlan.settings.trainingMealActive=checked;runAutoAdjustIfEnabled();refresh()}function toggleTrainingMeal(checked){currentPlan.settings.trainingMealActive=checked;currentPlan.meals.training.active=checked;runAutoAdjustIfEnabled();refresh()}function toggleRefeed(checked){currentPlan.settings.refeedActive=checked;runAutoAdjustIfEnabled();refresh()}function captureIngredientAmounts(){const amounts=[];eachPlanIngredient(item=>amounts.push(Number(item.amount)||0));return amounts}function restoreIngredientAmounts(amounts){if(!Array.isArray(amounts))return false;let index=0;eachPlanIngredient(item=>{if(amounts[index]!==undefined)item.amount=amounts[index];index++});return true}function resetIngredientAmountsToBase(){eachPlanIngredient(item=>{item.amount=item.baseAmount})}function toggleAutoAdjust(checked){if(checked){currentPlan.settings.autoAdjustAmountSnapshot=captureIngredientAmounts();currentPlan.settings.autoAdjustPortions=true;autoAdjustPortionsToTarget()}else{const restored=restoreIngredientAmounts(currentPlan.settings.autoAdjustAmountSnapshot);currentPlan.settings.autoAdjustPortions=false;currentPlan.settings.lastAutoAdjustKcal=0;currentPlan.settings.autoAdjustAmountSnapshot=null;if(!restored)resetIngredientAmountsToBase()}refresh()}function runAutoAdjustIfEnabled(){if(currentPlan.settings.autoAdjustPortions)autoAdjustPortionsToTarget()}function autoAdjustPortionsToTarget(){ensureSettingsDefaults();ensureIngredientAdjustDefaults();let totals=calculateTotals();const goals=activeGoals();let excess=totals.kcal-goals.calorieMax;currentPlan.settings.lastAutoAdjustKcal=0;if(excess<=0)return 0;const candidates=[];Object.keys(currentPlan.meals).forEach(mealKey=>{const meal=currentPlan.meals[mealKey];if(!meal||!meal.active)return;getMealIngredients(mealKey).forEach(item=>{if(item.active&&item.adjustable)candidates.push(item)})});candidates.sort((a,b)=>(Number(a.adjustPriority)||99)-(Number(b.adjustPriority)||99));let removed=0;candidates.forEach(item=>{if(excess<=0)return;const amount=Number(item.amount)||0;const min=Number(item.minAmount)||0;if(amount<=min)return;const kcalPerUnit=Number(item.baseKcal||0)/Number(item.baseAmount||1);if(kcalPerUnit<=0)return;const removableKcal=(amount-min)*kcalPerUnit;const kcalToRemove=Math.min(excess,removableKcal);let nextAmount=amount-kcalToRemove/kcalPerUnit;const step=amountStep(item);nextAmount=Math.max(min,Math.floor(nextAmount/step)*step);const actualRemoved=Math.max(0,(amount-nextAmount)*kcalPerUnit);item.amount=Number(nextAmount.toFixed(1));removed+=actualRemoved;excess-=actualRemoved});currentPlan.settings.lastAutoAdjustKcal=Math.round(removed);return removed}function toggleWeightValue(id,button){const value=document.getElementById(id);if(!value)return;const shown=value.classList.toggle("visible");const label=id==="startWeight"?"startvikt":id==="currentWeight"?"nuvarande vikt":"målvikt";if(button){button.setAttribute("aria-label",shown?`Dölj ${label}`:`Visa ${label}`);button.title=shown?`Dölj ${label}`:`Visa ${label}`}}function refresh(){syncSettings();renderMeals();renderSummary();}function syncSettings(){ensureSettingsDefaults();currentPlan.meals.training.active=currentPlan.settings.trainingMealActive;document.getElementById("trainingToggle").checked=currentPlan.settings.trainingMealActive;document.getElementById("refeedToggle").checked=currentPlan.settings.refeedActive;const autoAdjustToggle=document.getElementById("autoAdjustToggle");if(autoAdjustToggle)autoAdjustToggle.checked=!!currentPlan.settings.autoAdjustPortions;const refeedNote=document.getElementById("refeedNote");if(refeedNote)refeedNote.classList.toggle("active",currentPlan.settings.refeedActive);document.getElementById("startWeightInput").value=Number(currentPlan.meta.startWeightKg);document.getElementById("currentWeightInput").value=Number(currentPlan.meta.currentWeightKg);document.getElementById("goalWeightInput").value=Number(currentPlan.meta.goalWeightKg);}function renderSummary(){const totals=calculateTotals();const goals=activeGoals();const kcal=Math.round(totals.kcal);const protein=Math.round(totals.protein*10)/10;document.getElementById("totalCalories").textContent=`${formatNumber(kcal)} kcal`;document.getElementById("totalProtein").textContent=`${formatNumber(protein,1)} g`;document.getElementById("mobileCalories").textContent=`${formatNumber(kcal)} kcal`;document.getElementById("mobileProtein").textContent=`${formatNumber(protein,1)} g`;document.getElementById("calorieGoalText").textContent=`${formatNumber(goals.calorieMin)}-${formatNumber(goals.calorieMax)}`;document.getElementById("goalTimeText").textContent=calculateGoalTime();let calorieDiff=kcal<goals.calorieMin?`Du ligger ${formatNumber(goals.calorieMin-kcal)} kcal under målet`:kcal>goals.calorieMax?`Du ligger ${formatNumber(kcal-goals.calorieMax)} kcal över målet`:"Du ligger inom målet";document.getElementById("calorieDiff").textContent=calorieDiff;document.getElementById("proteinDiff").textContent=`Protein: ${formatNumber(protein,1)} g / mål ${formatNumber(goals.protein)} g`;const kcalPct=Math.min(140,kcal/goals.calorieMax*100);const proteinPct=Math.min(140,protein/goals.protein*100);const calorieBar=document.getElementById("calorieBar");calorieBar.style.width=`${Math.min(100,kcalPct)}%`;calorieBar.classList.toggle("calorie-warning",kcalPct>105&&kcalPct<120);calorieBar.classList.toggle("calorie-danger",kcalPct>=120);document.getElementById("proteinBar").style.width=`${Math.min(100,proteinPct)}%`;document.getElementById("calorieBarText").textContent=`${Math.round(kcalPct)}%`;document.getElementById("proteinBarText").textContent=`${Math.round(proteinPct)}%`;document.getElementById("modeNote").textContent="";const mobileStatus=document.getElementById("mobileStatus");mobileStatus.textContent=kcal>goals.calorieMax?"Över":kcal<goals.calorieMin?"Under":"OK";mobileStatus.classList.toggle("mobile-warning",kcalPct>105&&kcalPct<120);mobileStatus.classList.toggle("mobile-danger",kcalPct>=120)}function syncMealOptions(){const lunch=currentPlan.meals.lunch;const dinner=currentPlan.meals.dinner;if(!lunch||!dinner)return;lunch.options=lunch.options||{};dinner.options=dinner.options||{};const merged={...deepClone(lunch.options),...deepClone(dinner.options)};lunch.options=deepClone(merged);dinner.options=deepClone(merged)}function calculateGoalTime(){const start=Number(currentPlan.meta.startWeightKg)||100;const current=Number(currentPlan.meta.currentWeightKg)||start;const goal=Number(currentPlan.meta.goalWeightKg)||0;if(!goal||goal>=current)return "-";const goals=activeGoals();const target=(goals.calorieMin+goals.calorieMax)/2;const maintenance=Math.round(current*25.75);const deficit=Math.max(0,maintenance-target);if(deficit<100)return "-";const weeks=(current-goal)*7700/(deficit*7);const months=weeks/4.345;return `${Math.ceil(weeks)} veckor / ${formatNumber(months,1)} mån`}function savePlan(){localStorage.setItem(STORAGE_KEY,JSON.stringify(currentPlan));showToast("Sparat lokalt i webbläsaren.")}function loadPlan(){const saved=localStorage.getItem(STORAGE_KEY);if(!saved){ensureMetaDefaults();ensureSettingsDefaults();ensureIngredientAdjustDefaults();return}try{currentPlan=JSON.parse(saved);ensureMetaDefaults();ensureSettingsDefaults();currentPlan.meals.dinner.options={...deepClone(PLAN_DATA.meals.dinner.options),...(currentPlan.meals.dinner&&currentPlan.meals.dinner.options?currentPlan.meals.dinner.options:{})};ensureIngredientAdjustDefaults()}catch(error){currentPlan=deepClone(PLAN_DATA);ensureMetaDefaults();ensureSettingsDefaults();ensureIngredientAdjustDefaults()}}function resetPlan(){const modal=document.getElementById("resetConfirm");if(modal)modal.classList.add("active")}function closeResetConfirm(){const modal=document.getElementById("resetConfirm");if(modal)modal.classList.remove("active")}function confirmResetPlan(){closeResetConfirm();currentPlan=deepClone(PLAN_DATA);ensureSettingsDefaults();ensureIngredientAdjustDefaults();localStorage.removeItem(STORAGE_KEY);refresh();showToast("Återställt till standard.")}function showToast(message){const toast=document.getElementById("toast");toast.textContent=message;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),2400)}loadPlan();updateTargetsFromWeight();syncMealOptions();ensureSettingsDefaults();ensureIngredientAdjustDefaults();refresh();
