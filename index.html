<body>
<header><div class="wrap"><h1>KostFokus</h1><div class="top-grid card pad"><section><h2>Översikt</h2><div class="overview"><div class="metric"><div class="metric-head"><div class="label">Startvikt</div><button class="icon-button" type="button" onclick="toggleWeightValue('startWeight',this)" aria-label="Visa startvikt" title="Visa startvikt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="value weight-value" id="startWeight"><input class="weight-input" id="startWeightInput" type="number" min="40" max="250" step="0.1" value="100" onchange="updateWeight('start',this.value)"><span>kg</span></div></div><div class="metric"><div class="metric-head"><div class="label">Vikt</div><button class="icon-button" type="button" onclick="toggleWeightValue('currentWeight',this)" aria-label="Visa nuvarande vikt" title="Visa nuvarande vikt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="value weight-value" id="currentWeight"><input class="weight-input" id="currentWeightInput" type="number" min="40" max="250" step="0.1" value="100" onchange="updateWeight('current',this.value)"><span>kg</span></div></div><div class="metric"><div class="metric-head"><div class="label">Målvikt</div><button class="icon-button" type="button" onclick="toggleWeightValue('goalWeight',this)" aria-label="Visa målvikt" title="Visa målvikt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div><div class="value weight-value" id="goalWeight"><input class="weight-input" id="goalWeightInput" type="number" min="40" max="250" step="0.1" value="100" onchange="updateWeight('goal',this.value)"><span>kg</span></div></div><div class="metric"><div class="label">Kalorimål</div><div class="value" id="calorieGoalText">1 900-2 050</div></div><div class="metric"><div class="label">Tid till mål</div><div class="value" id="goalTimeText">-</div></div></div><div class="top-actions"><div class="controls compact-actions"><button onclick="savePlan()">Spara mina ändringar</button><button class="danger" onclick="resetPlan()">Återställ till standard</button></div><section class="toggle-row compact-toggles"><label class="toggle-card"><input type="checkbox" id="autoAdjustToggle" onchange="toggleAutoAdjust(this.checked)"><div><strong>Auto Portionsize</strong></div></label><label class="toggle-card"><input type="checkbox" id="refeedToggle" onchange="toggleRefeed(this.checked)"><div><strong>Refeed</strong></div></label><label class="toggle-card"><input type="checkbox" id="trainingToggle" onchange="toggleTrainingMeal(this.checked)"><div><strong>Recovery</strong></div></label></section></div></section><aside class="summary"><h2>Dagens total</h2><div class="big-totals"><div class="total-box"><strong id="totalCalories">0 kcal</strong><span id="calorieDiff">Mot mål</span></div><div class="total-box"><strong id="totalProtein">0 g</strong><span id="proteinDiff">Mot mål</span></div></div><div class="bar-label"><span>Kalorier</span><span id="calorieBarText">0%</span></div><div class="progress"><div id="calorieBar"></div></div><div class="bar-label"><span>Protein</span><span id="proteinBarText">0%</span></div><div class="progress"><div id="proteinBar"></div></div><p class="note" id="modeNote"></p></aside></div></div></header>
<main class="wrap"><nav class="view-tabs" aria-label="Vyval"><button class="view-tab active" id="foodViewTab" type="button" onclick="switchView('food')">Kost</button><button class="view-tab" id="trainingViewTab" type="button" onclick="switchView('training')">Träning</button></nav><section class="view-panel active" id="foodView"><section id="meals"></section></section><section class="view-panel" id="trainingView"><section id="trainingPlan"></section></section></main>

resh()}function updateIngredient(mealKey,index,value){const item=getMealIngredients(mealKey)[index];item.amount=Math.max(0,Number(value)||0);refresh()}function stepAmount(mealKey,index,direction){const item=getMealIngredients(mealKey)[index];item.amount=Math.max(0,Number(item.amount||0)+amountStep(item)*direction);refresh()}function toggleIngredient(mealKey,index,checked){getMealIngredients(mealKey)[index].active=checked;refresh()}function toggleMeal(mealKey,checked){currentPlan.meals[mealKey].active=checked;if(mealKey==="training")currentPlan.settings.trainingMealActive=checked;runAutoAdjustIfEnabled();refresh()}function toggleTrainingMeal(checked){currentPlan.settings.trainingMealActive=checked;currentPlan.meals.training.active=checked;runAutoAdjustIfEnabled();refresh()}function toggleRefeed(checked){currentPlan.settings.refeedActive=checked;runAutoAdjustIfEnabled();refresh()}function captureIngredientAmounts(){const amounts=[];eachPlanIngredient(item=>amounts.push(Number(item.amount)||0));return amounts}function restoreIngredientAmounts(amounts){if(!Array.isArray(amounts))return false;let index=0;eachPlanIngredient(item=>{if(amounts[index]!==undefined)item.amount=amounts[index];index++});return true}function resetIngredientAmountsToBase(){eachPlanIngredient(item=>{item.amount=item.baseAmount})}function toggleAutoAdjust(checked){if(checked){currentPlan.settings.autoAdjustAmountSnapshot=captureIngredientAmounts();currentPlan.settings.autoAdjustPortions=true;autoAdjustPortionsToTarget()}else{const restored=restoreIngredientAmounts(currentPlan.settings.autoAdjustAmountSnapshot);currentPlan.settings.autoAdjustPortions=false;currentPlan.settings.lastAutoAdjustKcal=0;currentPlan.settings.autoAdjustAmountSnapshot=null;if(!restored)resetIngredientAmountsToBase()}refresh()}function runAutoAdjustIfEnabled(){if(currentPlan.settings.autoAdjustPortions)autoAdjustPortionsToTarget()}function autoAdjustPortionsToTarget(){ensureSettingsDefaults();ensureIngredientAdjustDefaults();let totals=calculateTotals();const goals=activeGoals();let excess=totals.kcal-goals.calorieMax;currentPlan.settings.lastAutoAdjustKcal=0;if(excess<=0)return 0;const candidates=[];Object.keys(currentPlan.meals).forEach(mealKey=>{const meal=currentPlan.meals[mealKey];if(!meal||!meal.active)return;getMealIngredients(mealKey).forEach(item=>{if(item.active&&item.adjustable)candidates.push(item)})});candidates.sort((a,b)=>(Number(a.adjustPriority)||99)-(Number(b.adjustPriority)||99));let removed=0;candidates.forEach(item=>{if(excess<=0)return;const amount=Number(item.amount)||0;const min=Number(item.minAmount)||0;if(amount<=min)return;const kcalPerUnit=Number(item.baseKcal||0)/Number(item.baseAmount||1);if(kcalPerUnit<=0)return;const removableKcal=(amount-min)*kcalPerUnit;const kcalToRemove=Math.min(excess,removableKcal);let nextAmount=amount-kcalToRemove/kcalPerUnit;const step=amountStep(item);nextAmount=Math.max(min,Math.floor(nextAmount/step)*step);const actualRemoved=Math.max(0,(amount-nextAmount)*kcalPerUnit);item.amount=Number(nextAmount.toFixed(1));removed+=actualRemoved;excess-=actualRemoved});currentPlan.settings.lastAutoAdjustKcal=Math.round(removed);return removed}function toggleWeightValue(id,button){const value=document.getElementById(id);if(!value)return;const shown=value.classList.toggle("visible");const label=id==="startWeight"?"startvikt":id==="currentWeight"?"nuvarande vikt":"målvikt";if(button){button.setAttribute("aria-label",shown?`Dölj ${label}`:`Visa ${label}`);button.title=shown?`Dölj ${label}`:`Visa ${label}`}}function refresh(){syncSettings();renderMeals();renderSummary();}function syncSettings(){ensureSettingsDefaults();currentPlan.meals.training.active=currentPlan.settings.trainingMealActive;document.getElementById("trainingToggle").checked=currentPlan.settings.trainingMealActive;document.getElementById("refeedToggle").checked=currentPlan.settings.refeedActive;const autoAdjustToggle=document.getElementById("autoAdjustToggle");if(autoAdjustToggle)autoAdjustToggle.checked=!!currentPlan.settings.autoAdjustPortions;const refeedNote=document.getElementById("refeedNote");if(refeedNote)refeedNote.classList.toggle("active",currentPlan.settings.refeedActive);document.getElementById("startWeightInput").value=Number(currentPlan.meta.startWeightKg);document.getElementById("currentWeightInput").value=Number(currentPlan.meta.currentWeightKg);document.getElementById("goalWeightInput").value=Number(currentPlan.meta.goalWeightKg);}function renderSummary(){const totals=calculateTotals();const goals=activeGoals();const kcal=Math.round(totals.kcal);const protein=Math.round(totals.protein*10)/10;document.getElementById("totalCalories").textContent=`${formatNumber(kcal)} kcal`;document.getElementById("totalProtein").textContent=`${formatNumber(protein,1)} g`;document.getElementById("mobileCalories").textContent=`${formatNumber(kcal)} kcal`;document.getElementById("mobileProtein").textContent=`${formatNumber(protein,1)} g`;document.getElementById("calorieGoalText").textContent=`${formatNumber(goals.calorieMin)}-${formatNumber(goals.calorieMax)}`;document.getElementById("goalTimeText").textContent=calculateGoalTime();let calorieDiff=kcal<goals.calorieMin?`Du ligger ${formatNumber(goals.calorieMin-kcal)} kcal under målet`:kcal>goals.calorieMax?`Du ligger ${formatNumber(kcal-goals.calorieMax)} kcal över målet`:"Du ligger inom målet";document.getElementById("calorieDiff").textContent=calorieDiff;document.getElementById("proteinDiff").textContent=`Protein: ${formatNumber(protein,1)} g / mål ${formatNumber(goals.protein)} g`;const kcalPct=Math.min(140,kcal/goals.calorieMax*100);const proteinPct=Math.min(140,protein/goals.protein*100);const calorieBar=document.getElementById("calorieBar");calorieBar.style.width=`${Math.min(100,kcalPct)}%`;calorieBar.classList.toggle("calorie-warning",kcalPct>105&&kcalPct<120);calorieBar.classList.toggle("calorie-danger",kcalPct>=120);document.getElementById("proteinBar").style.width=`${Math.min(100,proteinPct)}%`;document.getElementById("calorieBarText").textContent=`${Math.round(kcalPct)}%`;document.getElementById("proteinBarText").textContent=`${Math.round(proteinPct)}%`;document.getElementById("modeNote").textContent="";const mobileStatus=document.getElementById("mobileStatus");mobileStatus.textContent=kcal>goals.calorieMax?"Över":kcal<goals.calorieMin?"Under":"OK";mobileStatus.classList.toggle("mobile-warning",kcalPct>105&&kcalPct<120);mobileStatus.classList.toggle("mobile-danger",kcalPct>=120)}function syncMealOptions(){const lunch=currentPlan.meals.lunch;const dinner=currentPlan.meals.dinner;if(!lunch||!dinner)return;lunch.options=lunch.options||{};dinner.options=dinner.options||{};const merged={...deepClone(lunch.options),...deepClone(dinner.options)};lunch.options=deepClone(merged);dinner.options=deepClone(merged)}function calculateGoalTime(){const start=Number(currentPlan.meta.startWeightKg)||100;const current=Number(currentPlan.meta.currentWeightKg)||start;const goal=Number(currentPlan.meta.goalWeightKg)||0;if(!goal||goal>=current)return "-";const goals=activeGoals();const target=(goals.calorieMin+goals.calorieMax)/2;const maintenance=Math.round(current*25.75);const deficit=Math.max(0,maintenance-target);if(deficit<100)return "-";const weeks=(current-goal)*7700/(deficit*7);const months=weeks/4.345;return `${Math.ceil(weeks)} veckor / ${formatNumber(months,1)} mån`}function savePlan(){localStorage.setItem(STORAGE_KEY,JSON.stringify(currentPlan));showToast("Sparat lokalt i webbläsaren.")}function loadPlan(){const saved=localStorage.getItem(STORAGE_KEY);if(!saved){ensureMetaDefaults();ensureSettingsDefaults();ensureIngredientAdjustDefaults();return}try{currentPlan=JSON.parse(saved);ensureMetaDefaults();ensureSettingsDefaults();currentPlan.meals.dinner.options={...deepClone(PLAN_DATA.meals.dinner.options),...(currentPlan.meals.dinner&&currentPlan.meals.dinner.options?currentPlan.meals.dinner.options:{})};ensureIngredientAdjustDefaults()}catch(error){currentPlan=deepClone(PLAN_DATA);ensureMetaDefaults();ensureSettingsDefaults();ensureIngredientAdjustDefaults()}}function resetPlan(){const modal=document.getElementById("resetConfirm");if(modal)modal.classList.add("active")}function closeResetConfirm(){const modal=document.getElementById("resetConfirm");if(modal)modal.classList.remove("active")}function confirmResetPlan(){closeResetConfirm();currentPlan=deepClone(PLAN_DATA);ensureSettingsDefaults();ensureIngredientAdjustDefaults();localStorage.removeItem(STORAGE_KEY);refresh();showToast("Återställt till standard.")}function showToast(message){const toast=document.getElementById("toast");toast.textContent=message;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),2400)}
function persistPlan(){localStorage.setItem(STORAGE_KEY,JSON.stringify(currentPlan))}
function escapeHtml(value){return String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}
function ensureTrainingMealDefaults(){currentPlan.meals=currentPlan.meals||{};const defaults=PLAN_DATA.meals.training;if(!currentPlan.meals.training)currentPlan.meals.training=deepClone(defaults);const meal=currentPlan.meals.training;meal.title=defaults.title;meal.type=defaults.type;meal.ingredients=Array.isArray(meal.ingredients)?meal.ingredients:[];defaults.ingredients.forEach(defaultItem=>{const item=meal.ingredients.find(ingredient=>ingredient.id===defaultItem.id);if(!item){meal.ingredients.push(deepClone(defaultItem));return}["name","baseAmount","unit","baseKcal","baseProtein"].forEach(key=>{item[key]=defaultItem[key]});if(item.id==="oat_milk"&&(Number(item.amount)===100||Number(item.amount)===1))item.amount=defaultItem.amount;else if(item.amount===undefined||item.amount===null)item.amount=defaultItem.amount;if(item.active===undefined)item.active=defaultItem.active})}
function ensureExtraEnergySelectionDefaults(){currentPlan.settings=currentPlan.settings||{};const meal=currentPlan.meals&&currentPlan.meals.training;if(!meal||currentPlan.settings.extraEnergyChoicesInitialized)return;(meal.ingredients||[]).forEach(item=>{item.active=false});currentPlan.settings.extraEnergyChoicesInitialized=true}
function ensureWrapOptionDefaults(){const defaultOption=PLAN_DATA.meals.lunch.options.kycklingwrap;["lunch","dinner"].forEach(mealKey=>{const meal=currentPlan.meals&&currentPlan.meals[mealKey];if(!meal)return;meal.options=meal.options||{};if(!meal.options.kycklingwrap)meal.options.kycklingwrap=deepClone(defaultOption);const option=meal.options.kycklingwrap;option.title=defaultOption.title;option.ingredients=Array.isArray(option.ingredients)?option.ingredients:[];defaultOption.ingredients.forEach(defaultItem=>{const item=option.ingredients.find(ingredient=>ingredient.id===defaultItem.id);if(!item){option.ingredients.push(deepClone(defaultItem));return}["name","baseAmount","unit","baseKcal","baseProtein"].forEach(key=>{item[key]=defaultItem[key]});if((item.id==="tortilla"||item.id==="tortilla_large")&&(item.amount===undefined||item.amount===null||Number(item.amount)===40||Number(item.amount)===62))item.amount=defaultItem.amount;else if(item.id==="chicken_wrap"&&(item.amount===undefined||item.amount===null||Number(item.amount)===100))item.amount=defaultItem.amount;else if(item.id==="pork_lifter_wrap"&&(item.amount===undefined||item.amount===null||Number(item.amount)===100))item.amount=defaultItem.amount;else if(item.id==="cheese_wrap"&&(item.amount===undefined||item.amount===null||Number(item.amount)===100))item.amount=defaultItem.amount;else if(item.amount===undefined||item.amount===null)item.amount=defaultItem.amount;if(item.active===undefined)item.active=defaultItem.active});option.ingredients.sort((a,b)=>{const order={tortilla_large:0,tortilla:1};return (order[a.id]??10)-(order[b.id]??10)})})}
function ensureMeatNutritionDefaults(){const values={chicken_lunch:{baseKcal:320,baseProtein:62},chicken_dinner:{baseKcal:320,baseProtein:62},chicken_wrap:{baseKcal:240,baseProtein:46.5},pork_lifter:{baseKcal:319,baseProtein:59.4},pork_lifter_wrap:{baseKcal:217.5,baseProtein:40.5}};eachPlanIngredient(item=>{const value=values[item.id];if(!value)return;item.baseKcal=value.baseKcal;item.baseProtein=value.baseProtein})}
function ensurePotatoDinnerDefaults(){eachPlanIngredient(item=>{if(item.id!=="potatoes_dinner")return;item.baseAmount=200;item.baseKcal=154;item.baseProtein=2;if(Number(item.amount)>200)item.amount=200})}
function ensureBreakfastDefaults(){eachPlanIngredient(item=>{if(item.id!=="peanut_butter")return;item.baseAmount=20;item.baseKcal=118;item.baseProtein=5;if(item.amount===undefined||item.amount===null||Number(item.amount)===10)item.amount=20})}
function ensureEveningDefaults(){eachPlanIngredient(item=>{if(item.id!=="granola")return;item.baseAmount=30;item.baseKcal=150;item.baseProtein=3;if(item.amount===undefined||item.amount===null||Number(item.amount)===20)item.amount=30})}
function ensureActiveViewDefault(){currentPlan.settings=currentPlan.settings||{};if(currentPlan.settings.activeView!=="training"&&currentPlan.settings.activeView!=="food")currentPlan.settings.activeView="food"}
function switchView(view){currentPlan.settings=currentPlan.settings||{};currentPlan.settings.activeView=view==="training"?"training":"food";persistPlan();applyActiveView()}
function applyActiveView(){ensureActiveViewDefault();const isTraining=currentPlan.settings.activeView==="training";const foodView=document.getElementById("foodView");const trainingView=document.getElementById("trainingView");const foodTab=document.getElementById("foodViewTab");const trainingTab=document.getElementById("trainingViewTab");if(foodView)foodView.classList.toggle("active",!isTraining);if(trainingView)trainingView.classList.toggle("active",isTraining);if(foodTab)foodTab.classList.toggle("active",!isTraining);if(trainingTab)trainingTab.classList.toggle("active",isTraining);document.body.classList.toggle("training-view",isTraining)}
function ensureTrainingPlanDefaults(){if(!currentPlan.trainingPlan)currentPlan.trainingPlan=deepClone(PLAN_DATA.trainingPlan);(currentPlan.trainingPlan.week||[]).forEach(day=>{day.exercises=(day.exercises||[]).filter(exercise=>exercise.name!=="Overhead triceps extension")});const defaults=PLAN_DATA.trainingPlan;["title","subtitle","goal","focus"].forEach(key=>{if(currentPlan.trainingPlan[key]===undefined)currentPlan.trainingPlan[key]=defaults[key]});["recommendations","principles","cardioRules","progression","weeklyFollowUp"].forEach(key=>{if(!Array.isArray(currentPlan.trainingPlan[key]))currentPlan.trainingPlan[key]=deepClone(defaults[key])});if(!Array.isArray(currentPlan.trainingPlan.week))currentPlan.trainingPlan.week=deepClone(defaults.week);defaults.week.forEach((defaultDay,dayIndex)=>{const day=currentPlan.trainingPlan.week[dayIndex]||(currentPlan.trainingPlan.week[dayIndex]=deepClone(defaultDay));["day","pass","time","cardio","note"].forEach(key=>{if(day[key]===undefined)day[key]=defaultDay[key]});if(day.completed===undefined)day.completed=false;if(day.expanded===undefined)day.expanded=false;if(!Array.isArray(day.exercises))day.exercises=deepClone(defaultDay.exercises);defaultDay.exercises.forEach((defaultExercise,exerciseIndex)=>{const exercise=day.exercises[exerciseIndex]||(day.exercises[exerciseIndex]=deepClone(defaultExercise));["name","sets","reps","rest"].forEach(key=>{if(exercise[key]===undefined)exercise[key]=defaultExercise[key]});if(exercise.weight===undefined)exercise.weight="";if(exercise.notes===undefined)exercise.notes="";if(exercise.completed===undefined)exercise.completed=false})});if(!Array.isArray(currentPlan.trainingPlan.weeklyChecklist))currentPlan.trainingPlan.weeklyChecklist=deepClone(defaults.weeklyChecklist);defaults.weeklyChecklist.forEach((defaultItem,index)=>{const item=currentPlan.trainingPlan.weeklyChecklist[index]||(currentPlan.trainingPlan.weeklyChecklist[index]=deepClone(defaultItem));if(item.text===undefined)item.text=defaultItem.text;if(item.completed===undefined)item.completed=false})}
function renderTrainingPlan(){ensureTrainingPlanDefaults();const root=document.getElementById("trainingPlan");if(!root)return;const plan=currentPlan.trainingPlan;const summary=calculateTrainingSummary();root.className="card training-shell";root.innerHTML=`<div class="training-head"><h2>${escapeHtml(plan.title)}</h2><p class="training-subtitle">${escapeHtml(plan.subtitle)}</p></div><div class="training-body"><h2>Veckoschema</h2><div id="trainingWeek" class="training-week">${renderTrainingWeek()}</div><div class="training-summary"><div class="metric"><div class="label">Styrkepass klara denna vecka</div><div class="value">${summary.strengthCompleted} / 4</div></div><div class="metric"><div class="label">Totala dagar/pass klara</div><div class="value">${summary.daysCompleted} / 7</div></div></div><div class="training-panel"><strong>Rekommendationer</strong><div class="training-grid">${plan.recommendations.map(item=>`<div><span class="label">${escapeHtml(item.area)}</span><div>${escapeHtml(item.recommendation)}</div></div>`).join("")}</div></div><div class="doc-grid"><section class="training-panel training-wide"><strong>Kardio - endast som verktyg</strong><ul class="training-list">${plan.cardioRules.map(item=>`<li><b>${escapeHtml(item.situation)}:</b> ${escapeHtml(item.action)}</li>`).join("")}</ul></section></div></div>`}
function renderTrainingWeek(){ensureTrainingPlanDefaults();return currentPlan.trainingPlan.week.map((day,index)=>renderTrainingDay(index)).join("")}
function renderTrainingDay(dayIndex){const day=currentPlan.trainingPlan.week[dayIndex];const hasExercises=(day.exercises||[]).length>0;const exerciseRows=hasExercises?`<div class="training-exercises"><table class="training-table"><thead><tr><th>\u00d6vning</th><th>Set</th><th>Reps</th><th>Vila</th><th>Vikt</th><th>Notering</th><th>Klar</th></tr></thead><tbody>${day.exercises.map((exercise,exerciseIndex)=>`<tr class="${exercise.completed?"inactive":""}"><td><div class="ingredient-name">${escapeHtml(exercise.name)}</div></td><td>${escapeHtml(exercise.sets)}</td><td>${escapeHtml(exercise.reps)}</td><td>${escapeHtml(exercise.rest)}</td><td><input class="training-input" name="weight" value="${escapeHtml(exercise.weight)}" onchange="updateExerciseWeight(${dayIndex},${exerciseIndex},this.value)" placeholder="kg"></td><td><input class="training-input" name="notes" value="${escapeHtml(exercise.notes)}" onchange="updateExerciseNotes(${dayIndex},${exerciseIndex},this.value)"></td><td class="num"><input type="checkbox" ${exercise.completed?"checked":""} onchange="toggleExercise(${dayIndex},${exerciseIndex},this.checked)"></td></tr>`).join("")}</tbody></table></div>`:`<div class="training-exercises"><div class="pad muted">Vilodag utan \u00f6vningar.</div></div>`;return`<article class="training-day ${day.completed?"done":""}"><div class="training-day-head"><input type="checkbox" ${day.completed?"checked":""} onchange="toggleTrainingDay(${dayIndex},this.checked)" aria-label="Markera ${escapeHtml(day.day)} klar"><div class="training-day-main"><strong>${escapeHtml(day.day)}</strong><strong class="training-pass">${escapeHtml(day.pass)}</strong><div class="training-cardio">${escapeHtml(day.cardio)}</div></div><button class="secondary training-expand" type="button" onclick="toggleTrainingDayExpanded(${dayIndex})">${day.expanded?"D\u00f6lj pass":"Visa pass"}</button></div>${day.expanded?exerciseRows:""}</article>`}
function toggleTrainingDay(dayIndex,checked){ensureTrainingPlanDefaults();const day=currentPlan.trainingPlan.week[dayIndex];day.completed=checked;(day.exercises||[]).forEach(exercise=>{exercise.completed=checked});persistPlan();refresh()}
function toggleTrainingDayExpanded(dayIndex){ensureTrainingPlanDefaults();const day=currentPlan.trainingPlan.week[dayIndex];day.expanded=!day.expanded;persistPlan();refresh()}

function updateExerciseNotes(dayIndex,exerciseIndex,value){ensureTrainingPlanDefaults();currentPlan.trainingPlan.week[dayIndex].exercises[exerciseIndex].notes=value;persistPlan()}
function toggleWeeklyChecklist(index,checked){ensureTrainingPlanDefaults();currentPlan.trainingPlan.weeklyChecklist[index].completed=checked;persistPlan();refresh()}
function calculateTrainingSummary(){ensureTrainingPlanDefaults();const week=currentPlan.trainingPlan.week||[];const checklist=currentPlan.trainingPlan.weeklyChecklist||[];return{strengthCompleted:week.filter(day=>day.pass!=="Vila"&&day.completed).length,daysCompleted:week.filter(day=>day.completed).length,checklistCompleted:checklist.filter(item=>item.completed).length,checklistTotal:checklist.length}}

loadPlan();updateTargetsFromWeight();syncMealOptions();ensureSettingsDefaults();ensureTrainingMealDefaults();ensureExtraEnergySelectionDefaults();ensureWrapOptionDefaults();ensureMeatNutritionDefaults();ensurePotatoDinnerDefaults();ensureBreakfastDefaults();ensureEveningDefaults();ensureIngredientAdjustDefaults();ensureTrainingPlanDefaults();refresh();
